<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAC-RUNNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #000; }

canvas#c { display: block; position: fixed; inset: 0; }

/* ── HUD ── */
#hud {
  position: fixed; inset: 0; pointer-events: none; z-index: 50;
  font-family: 'Orbitron', 'Segoe UI', sans-serif;
}
#hud-top {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
}
.hud-block { display: flex; flex-direction: column; align-items: center; }
.hud-lbl { font-size: 8px; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
.hud-val { font-size: 19px; font-weight: 900; color: #fff; letter-spacing: 1px; }
#hv-score { color: #ffdd00; text-shadow: 0 0 12px rgba(255,220,0,.7); }
#hv-best  { color: rgba(255,255,255,.45); font-size: 13px; }
#hv-speed { color: #00f2ff; }
/* Lives */
#hud-lives { display: flex; gap: 5px; align-items: center; }
.life-dot { width: 14px; height: 14px; background: #ffdd00; border-radius: 50%;
  box-shadow: 0 0 8px rgba(255,220,0,.8); }
.life-dot.lost { background: rgba(255,255,255,.15); box-shadow: none; }
/* Fright bar */
#fright-bar-wrap {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  padding-bottom: 12px; display: none; flex-direction: column; align-items: center; gap: 4px;
}
#fright-bar-wrap.show { display: flex; }
#fright-bar-bg { width: 160px; height: 6px; background: rgba(255,255,255,.12); border-radius: 3px; overflow: hidden; }
#fright-bar-fill { height: 100%; background: #ff00e5; border-radius: 3px; transition: width .1s linear; }
#fright-label { font-size: 9px; letter-spacing: 3px; color: #ff00e5; }

/* ── LANE INDICATORS ── */
#lane-dots {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; align-items: center;
  pointer-events: none;
}
.ldot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.18);
  transition: background .15s, transform .15s, box-shadow .15s; }
.ldot.active { background: #ffdd00; transform: scale(1.5); box-shadow: 0 0 10px rgba(255,220,0,.8); }

/* ── FACE CAM ── */
#cam-wrap {
  position: fixed; top: 14px; right: 14px; z-index: 60;
  width: 148px; height: 100px;
  border: 1px solid rgba(0,242,255,.3); border-radius: 10px; overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,.6);
}
#cam-wrap .scan { position: absolute; left: 0; right: 0; height: 2px;
  background: rgba(0,242,255,.55); animation: scanV 2.4s linear infinite; z-index: 2; }
@keyframes scanV { 0%{top:0} 100%{top:100%} }
#input_video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

/* ── MOUTH METER ── */
#mouth-meter {
  position: fixed; top: 122px; right: 14px; z-index: 60;
  width: 148px; display: flex; flex-direction: column; gap: 4px; align-items: center;
}
#mm-bar { width: 100%; height: 7px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden; }
#mm-fill { height: 100%; background: linear-gradient(90deg, #ffdd00, #ff00e5); border-radius: 4px; width: 0%; transition: width .08s; }
#mm-label { font-family: 'Share Tech Mono',monospace; font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,.3); }
#mm-status { font-family: 'Share Tech Mono',monospace; font-size: 9px; letter-spacing: 1px; color: #ffdd00; height: 13px; }

/* ── TILT INDICATOR ── */
#tilt-ring {
  position: fixed; top: 168px; right: 14px; z-index: 60;
  width: 148px; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
#tilt-bar { width: 100%; height: 7px; background: rgba(255,255,255,.08); border-radius: 4px; position: relative; overflow: hidden; }
#tilt-center { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: rgba(255,255,255,.3); transform: translateX(-50%); }
#tilt-cursor { position: absolute; top: 0; height: 100%; width: 24px; background: #00f2ff; border-radius: 4px; transition: left .08s; left: calc(50% - 12px); }
#tilt-label { font-family: 'Share Tech Mono',monospace; font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,.3); }
#tilt-dir { font-family: 'Share Tech Mono',monospace; font-size: 9px; color: #00f2ff; height: 13px; letter-spacing: 1px; }

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0; z-index: 300;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,.88); backdrop-filter: blur(10px);
  font-family: 'Orbitron', sans-serif;
}
.screen.hidden { display: none; }
.scr-title {
  font-size: clamp(32px,7vw,72px); font-weight: 900; margin-bottom: 8px; text-align: center;
  background: linear-gradient(135deg, #fff, #ffdd00); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
}
.scr-sub { font-family: 'Share Tech Mono',monospace; font-size: 13px;
  letter-spacing: 3px; color: rgba(255,255,255,.4); margin-bottom: 40px; text-align: center; }
.scr-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
.scr-btn {
  font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 3px;
  padding: 16px 32px; border-radius: 8px; cursor: pointer; border: none;
  transition: all .25s; text-decoration: none; display: inline-flex; align-items: center;
}
.scr-btn-primary { background: linear-gradient(135deg,#00c8d4,#0088ff); color:#000; font-weight:700; box-shadow:0 0 24px rgba(0,200,212,.4); }
.scr-btn-primary:hover { box-shadow:0 0 44px rgba(0,200,212,.8); transform:translateY(-2px); }
.scr-btn-sec { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.2); }
.scr-btn-sec:hover { background: rgba(255,255,255,.07); }

/* score breakdown */
.score-row {
  display: flex; justify-content: space-between; gap: 80px;
  font-family: 'Share Tech Mono',monospace; font-size: 13px; margin-bottom: 10px;
}
.score-row-lbl { color: rgba(255,255,255,.4); letter-spacing: 2px; }
.score-row-val { color: #fff; font-weight: bold; }
#go-final { font-family:'Orbitron',sans-serif; font-size:clamp(36px,7vw,72px); font-weight:900;
  color: #ffdd00; text-shadow: 0 0 30px rgba(255,220,0,.8); margin-bottom: 6px; }
#go-rank { font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:3px;
  color: rgba(255,255,255,.35); margin-bottom: 36px; }

/* ── SCORE POPUP ── */
.score-pop {
  position: fixed; pointer-events: none; z-index: 200;
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px;
  color: #ffdd00; text-shadow: 0 0 12px rgba(255,220,0,.8);
  animation: popUp .7s ease forwards;
}
@keyframes popUp { 0%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 100%{opacity:0;transform:translate(-50%,-200%) scale(.8)} }

/* ── DAMAGE FLASH ── */
#dmg-flash {
  position: fixed; inset: 0; z-index: 250; pointer-events: none;
  background: rgba(255,0,0,0); transition: background .05s;
}

/* ── TOASTS ── */
#toast-zone {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px; z-index: 400;
  align-items: center; pointer-events: none;
}
.toast {
  background: rgba(2,4,8,.96); border: 1px solid rgba(0,242,255,.2);
  border-radius: 20px; padding: 8px 20px;
  font-family: 'Share Tech Mono',monospace; font-size: 12px; letter-spacing: 1px;
  color: #fff; opacity: 0; transform: translateY(10px); transition: all .3s;
}
.toast.show { opacity: 1; transform: none; }
.toast.coin   { border-color: rgba(255,220,0,.4); color: #ffdd00; }
.toast.ghost  { border-color: rgba(255,0,229,.4); color: #ff00e5; }
.toast.bad    { border-color: rgba(255,34,68,.4);  color: #ff2244; }
.toast.info   { border-color: rgba(0,242,255,.4);  color: #00f2ff; }
</style>
</head>
<body>

<!-- THREE.JS CANVAS -->
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-top">
    <div class="hud-block">
      <div class="hud-lbl">SCORE</div>
      <div class="hud-val" id="hv-score">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-lbl">BEST</div>
      <div class="hud-val" id="hv-best">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-lbl">LIVES</div>
      <div id="hud-lives">
        <div class="life-dot" id="life-0"></div>
        <div class="life-dot" id="life-1"></div>
        <div class="life-dot" id="life-2"></div>
      </div>
    </div>
    <div class="hud-block">
      <div class="hud-lbl">SPEED</div>
      <div class="hud-val" id="hv-speed">1.0×</div>
    </div>
    <div class="hud-block" style="pointer-events:all;cursor:pointer;" onclick="window.location='/'">
      <div class="hud-lbl">EXIT</div>
      <div class="hud-val" style="font-size:16px;opacity:.5;">✕</div>
    </div>
  </div>
  <!-- Fright timer bar -->
  <div id="fright-bar-wrap">
    <div id="fright-label">⚡ FRIGHT MODE</div>
    <div id="fright-bar-bg"><div id="fright-bar-fill" style="width:100%"></div></div>
  </div>
  <!-- Lane dots -->
  <div id="lane-dots">
    <div class="ldot" id="ld-0"></div>
    <div class="ldot active" id="ld-1"></div>
    <div class="ldot" id="ld-2"></div>
  </div>
</div>

<!-- Face cam -->
<div id="cam-wrap">
  <div class="scan"></div>
  <video id="input_video" autoplay muted playsinline></video>
</div>
<!-- Mouth meter -->
<div id="mouth-meter">
  <div id="mm-label">MOUTH OPEN</div>
  <div id="mm-bar"><div id="mm-fill"></div></div>
  <div id="mm-status"></div>
</div>
<!-- Tilt indicator -->
<div id="tilt-ring">
  <div id="tilt-label">HEAD TILT</div>
  <div id="tilt-bar">
    <div id="tilt-center"></div>
    <div id="tilt-cursor"></div>
  </div>
  <div id="tilt-dir"></div>
</div>

<!-- Damage flash -->
<div id="dmg-flash"></div>

<!-- SCREEN: MENU -->
<div class="screen" id="scr-menu">
  <div style="font-size:80px;margin-bottom:8px;animation:spin .6s linear infinite;display:inline-block;">◖</div>
  <div class="scr-title">PAC-RUNNER</div>
  <div class="scr-sub">FACE-CONTROLLED ENDLESS RUNNER</div>
  <div class="scr-btns">
    <button class="scr-btn scr-btn-primary" onclick="Game.start()">▶ START</button>
    <a href="/" class="scr-btn scr-btn-sec">HOME</a>
  </div>
  <div style="margin-top:24px;font-family:'Share Tech Mono',monospace;font-size:10px;
       color:rgba(255,255,255,.22);letter-spacing:2px;text-align:center;line-height:1.9;">
    TILT HEAD ← → TO SWITCH LANES · HEAD STRAIGHT = MIDDLE<br>
    OPEN MOUTH TO EAT COINS & ACTIVATE POWER-UPS<br>
    A / D  OR  ← → AS KEYBOARD FALLBACK
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- SCREEN: GAME OVER -->
<div class="screen hidden" id="scr-go">
  <div class="scr-title" style="-webkit-text-fill-color:#ff2244;color:#ff2244;">GAME OVER</div>
  <div id="go-final">0</div>
  <div id="go-rank">RANK: —</div>
  <div id="go-breakdown" style="margin-bottom:32px;text-align:center;"></div>
  <div class="scr-btns">
    <button class="scr-btn scr-btn-primary" onclick="Game.start()">↺ RETRY</button>
    <a href="/leaderboard" class="scr-btn scr-btn-sec">🏆 SCORES</a>
    <a href="/" class="scr-btn scr-btn-sec">HOME</a>
  </div>
</div>

<!-- Toast zone -->
<div id="toast-zone"></div>

<!-- THREE.JS + MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
'use strict';
/* ════════════════════════════════════════════════════════
   NEURAL PAC-MAN RUNNER  ·  Three.js + MediaPipe Face Mesh
   ════════════════════════════════════════════════════════ */

// ── CONSTANTS ──────────────────────────────────────────────────────────
const LANE_X        = [-3.0, 0, 3.0];      // world X per lane
const ROAD_W        = 10.5;                 // total road width
const ROAD_HALF     = ROAD_W / 2;
const SPAWN_Z       = -90;                  // objects spawn here
const KILL_Z        =  12;                  // objects removed here
const COIN_Y        =  0.85;
const OBJ_Y         =  0.8;
const SPEED_INIT    =  0.22;               // units/frame @60fps
const SPEED_MAX     =  0.80;
const SPEED_ACCEL   =  0.000028;           // per frame
const LANE_LERP     =  0.13;              // lane switch smoothness
const TILT_THRESH   =  12;                // degrees for lane change
const MOUTH_THRESH  =  0.28;             // ratio for mouth open
const FRIGHT_TIME   =  8;                // seconds
const INVINCIBLE_T  =  3;                // seconds after hit
const COIN_SCORE    =  10;
const PELLET_SCORE  =  50;
const GHOST_SCORE   =  200;
const DIST_SCORE    =  1;                // per frame

// ── THREE.JS SETUP ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.localClippingEnabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000005);
scene.fog = new THREE.FogExp2(0x000005, 0.016);   // depth fog = distance illusion

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 220);
camera.position.set(0, 5.5, 10);
camera.lookAt(0, 0.5, -8);

// Lights
scene.add(new THREE.AmbientLight(0x112244, 1.4));
const dirL = new THREE.DirectionalLight(0xffffff, 1.0);
dirL.position.set(0, 20, 5);
dirL.castShadow = true;
scene.add(dirL);
const rimL = new THREE.PointLight(0x00f2ff, 4, 30);
rimL.position.set(0, 6, 2);
scene.add(rimL);

// ── ROAD ───────────────────────────────────────────────────────────────
function makeRoadTexture() {
  const W = 1024, H = 2048;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // White paper base (like the stipple reference art)
  ctx.fillStyle = '#f0efe9';
  ctx.fillRect(0, 0, W, H);

  // ── Density field: drives where dots/triangles are dense ──────────────
  function density(x, y) {
    const nx = x / W, ny = y / H;
    const d1 = Math.exp(-((nx-0.22)**2*18 + (ny-0.18)**2*14)) * 0.9;
    const d2 = Math.exp(-((nx-0.72)**2*16 + (ny-0.72)**2*12)) * 0.85;
    const d3 = Math.exp(-((nx-0.48)**2*8  + (ny-0.45)**2*7))  * 0.55;
    const ex = 4*nx*(1-nx), ey = 4*ny*(1-ny);
    return Math.min(1, d1 + d2 + d3 + (1 - ex*ey*0.4)*0.28);
  }

  // ── Fast seeded PRNG ──────────────────────────────────────────────────
  let _s = 42;
  const rng = () => { _s=(_s*1664525+1013904223)&0xffffffff; return (_s>>>0)/0xffffffff; };

  // ── 1. Stipple dots (22k — fast enough, no freeze) ───────────────────
  for (let i = 0; i < 22000; i++) {
    const x = rng()*W, y = rng()*H;
    const d = density(x, y);
    if (rng() < d) {
      const r = Math.max(0.3, 1.3 - d);
      ctx.fillStyle = `rgba(0,0,0,${(0.55 + d*0.35).toFixed(2)})`;
      ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fill();
    }
  }

  // ── 2. Lightweight triangulation (grid + jitter, O(n) not O(n²)) ─────
  // Grid-based Delaunay-look: subdivide into triangles with density-driven jitter
  // This looks identical to Delaunay at road scale but runs in <5ms
  const COLS = 38, ROWS = 76;
  const cw = W / COLS, rh = H / ROWS;

  // Build jittered grid points
  const pts = [];
  for (let r = 0; r <= ROWS; r++) {
    for (let col = 0; col <= COLS; col++) {
      const bx = col * cw, by = r * rh;
      const d  = density(bx, by);
      // Denser zones: tighter jitter (smaller triangles)
      const jx = (rng()-0.5) * cw * (0.45 + (1-d)*0.55);
      const jy = (rng()-0.5) * rh * (0.45 + (1-d)*0.55);
      pts.push([
        Math.max(0, Math.min(W, bx + jx)),
        Math.max(0, Math.min(H, by + jy))
      ]);
    }
  }

  // Draw two triangles per grid cell (upper-left + lower-right)
  ctx.setLineDash([]);
  for (let r = 0; r < ROWS; r++) {
    for (let col = 0; col < COLS; col++) {
      const i00 = r*(COLS+1)+col,       i10 = i00+1;
      const i01 = (r+1)*(COLS+1)+col,   i11 = i01+1;
      const [ax,ay] = pts[i00], [bx,by] = pts[i10];
      const [cx2,cy] = pts[i01], [dx,dy] = pts[i11];

      const midX = (ax+bx+cx2+dx)/4, midY = (ay+by+cy+dy)/4;
      const d = density(midX, midY);
      const alpha = (0.18 + d*0.52).toFixed(2);
      const lw    = 0.35 + (1-d)*0.85;

      ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
      ctx.lineWidth   = lw;

      // Upper-left triangle
      ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(cx2,cy); ctx.closePath(); ctx.stroke();
      // Lower-right triangle
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(dx,dy); ctx.lineTo(cx2,cy); ctx.closePath(); ctx.stroke();

      // Subtle fill in dense zones
      if (d > 0.5) {
        ctx.fillStyle = `rgba(0,0,0,${(d*0.07).toFixed(3)})`;
        ctx.fill();
      }
    }
  }

  // ── 3. Lane dividers: dashed black ───────────────────────────────────
  ctx.setLineDash([120, 80]);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 5;
  [341, 682].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  });

  // ── 4. Neon cyan edges ────────────────────────────────────────────────
  ctx.setLineDash([]);
  ctx.strokeStyle = 'rgba(0,180,210,0.75)';
  ctx.lineWidth   = 6;
  ctx.shadowColor = '#00f2ff';
  ctx.shadowBlur  = 20;
  [18, 1006].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  });
  ctx.shadowBlur = 0;

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 18);
  return tex;
}

const roadTex = makeRoadTexture();
const roadMat = new THREE.MeshStandardMaterial({
  map: roadTex, roughness: 0.88, metalness: 0.0, color: 0xfafaf8
});
const roadMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(ROAD_W, 220),
  roadMat
);
roadMesh.rotation.x = -Math.PI / 2;
roadMesh.position.set(0, 0, -100);
roadMesh.receiveShadow = true;
scene.add(roadMesh);

// Side walls (neon strip lights)
function addSideWall(x, color) {
  // Thin glowing strip
  const geo = new THREE.BoxGeometry(0.08, 1.4, 220);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 1.2, roughness: 0.2
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, 0.7, -100);
  scene.add(m);
  // Point light at intervals
  for (let z = -90; z < 20; z += 30) {
    const pl = new THREE.PointLight(color, 1.5, 8);
    pl.position.set(x, 1, z);
    scene.add(pl);
  }
}
addSideWall(-ROAD_HALF - 0.15, 0x00f2ff);
addSideWall( ROAD_HALF + 0.15, 0x00f2ff);

// Ground outside road (dark)
const groundMat = new THREE.MeshStandardMaterial({ color: 0x000308, roughness: 1 });
const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(200, 220), groundMat);
groundMesh.rotation.x = -Math.PI/2;
groundMesh.position.set(0, -0.02, -100);
scene.add(groundMesh);

// ── PAC-MAN ────────────────────────────────────────────────────────────
const PM = {
  group:   null,
  upperJaw:null,
  lowerJaw:null,
  eyeMesh: null,
  glow:    null,
  x:       0,                // current world X
  targetX: 0,                // lerp target
  lane:    1,                // 0=left 1=mid 2=right
  mouthOpen: 0,              // 0..1
  mouthTarget: 0,
  chomping: false,
  chompTimer: 0,
};

function buildPacMan() {
  if (PM.group) scene.remove(PM.group);
  const g = new THREE.Group();
  const r = 0.75;

  const mat = new THREE.MeshPhongMaterial({
    color: 0xFFDD00, emissive: 0x553300, shininess: 90,
    side: THREE.DoubleSide,
  });

  // Upper jaw — top hemisphere, flat face at y=0
  const upperGeo = new THREE.SphereGeometry(r, 36, 20, 0, Math.PI*2, 0, Math.PI*0.5);
  PM.upperJaw = new THREE.Mesh(upperGeo, mat.clone());

  // Lower jaw — bottom hemisphere
  const lowerGeo = new THREE.SphereGeometry(r, 36, 20, 0, Math.PI*2, Math.PI*0.5, Math.PI*0.5);
  PM.lowerJaw = new THREE.Mesh(lowerGeo, mat.clone());

  // Rotate both jaws so the flat face (mouth) points toward -Z (forward/into scene)
  // By rotating X by -PI/2: +Y (dome) maps to +Z (toward camera) so we see the round back
  // The flat y=0 plane becomes the XZ plane; the opening faces in the ±Z direction
  // We rotate group by -PI/2 so mouth faces -Z (forward)
  PM.upperJaw.rotation.x = 0;
  PM.lowerJaw.rotation.x = 0;
  g.add(PM.upperJaw, PM.lowerJaw);

  // Rotate the whole pac-man group so the split (mouth) faces -Z
  g.rotation.x = -Math.PI / 2;

  // Eye (positioned on side, visible from camera)
  const eyeGeo = new THREE.SphereGeometry(0.115, 10, 10);
  const eyeMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 120 });
  PM.eyeMesh = new THREE.Mesh(eyeGeo, eyeMat);
  PM.eyeMesh.position.set(0.42, 0.32, r * 0.5); // in local pre-rotation coords
  g.add(PM.eyeMesh);

  // Glow light beneath Pac-Man
  PM.glow = new THREE.PointLight(0xFFCC00, 3.5, 5);
  PM.glow.position.set(0, 0, 0);
  g.add(PM.glow);

  // Place group: rotation.x = -PI/2 so dome faces +Z (camera), mouth opens into -Z
  PM.group = g;
  g.position.set(0, r + 0.1, 1.5);

  scene.add(g);
}

function updatePacManMouth(dt) {
  // Smooth mouth open/close
  PM.mouthOpen += (PM.mouthTarget - PM.mouthOpen) * Math.min(1, dt * 12);
  const angle = PM.mouthOpen * 0.42; // max ~24 degrees
  // Rotate upper jaw up, lower jaw down (in pre-rotation local space)
  PM.upperJaw.rotation.x =  angle;
  PM.lowerJaw.rotation.x = -angle;
}

function animatePacManChomp() {
  // Auto-chomp when mouth target is open
  if (PM.mouthTarget > 0.3) {
    PM.chompTimer++;
    if (PM.chompTimer % 10 < 5) {
      PM.upperJaw.rotation.x += 0.05;
      PM.lowerJaw.rotation.x -= 0.05;
    }
  } else {
    PM.chompTimer = 0;
  }
}

// ── MATERIALS (reused) ─────────────────────────────────────────────────
const GHOST_COLORS = [0xff2244, 0xff88ff, 0x22ffff, 0xff8822];
const GHOST_MAT_FRIGHT = new THREE.MeshPhongMaterial({ color: 0x0000ee, emissive: 0x000088, shininess: 60, side: THREE.DoubleSide });
const COIN_MAT  = new THREE.MeshPhongMaterial({ color: 0xFFDD00, emissive: 0x886600, shininess: 120 });
const PELLET_MAT = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xaaaaaa, shininess: 200 });

// ── OBJECT POOLS ───────────────────────────────────────────────────────
const ghostPool  = [];  // {group, bodyMat, alive, lane, z, speed, frightened, active}
const coinPool   = [];  // {mesh, alive, lane, z, active}
const pelletPool = [];  // {mesh, alive, lane, z, active}

function makeGhost(colorIndex) {
  const g = new THREE.Group();
  const col = GHOST_COLORS[colorIndex % GHOST_COLORS.length];
  const mat = new THREE.MeshPhongMaterial({ color: col, emissive: new THREE.Color(col).multiplyScalar(0.35), shininess: 60, side: THREE.DoubleSide });

  // Dome body
  const domeGeo = new THREE.SphereGeometry(0.62, 20, 14, 0, Math.PI*2, 0, Math.PI*0.52);
  const dome = new THREE.Mesh(domeGeo, mat);
  g.add(dome);

  // Skirt (bottom)
  const skirtGeo = new THREE.CylinderGeometry(0.62, 0.62, 0.38, 20, 1, true);
  const skirt = new THREE.Mesh(skirtGeo, mat.clone());
  skirt.position.y = -0.38;
  g.add(skirt);

  // Wavy bottom (scallops)
  for (let i = 0; i < 5; i++) {
    const bGeo = new THREE.SphereGeometry(0.13, 8, 8);
    const b = new THREE.Mesh(bGeo, mat.clone());
    const angle = (i / 5) * Math.PI * 2;
    b.position.set(Math.cos(angle)*0.55, -0.62, Math.sin(angle)*0.55);
    g.add(b);
  }

  // Eyes
  const wMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
  const pMat = new THREE.MeshPhongMaterial({ color: 0x0044ff });
  [-0.22, 0.22].forEach(ox => {
    const eye  = new THREE.Mesh(new THREE.SphereGeometry(0.155, 10, 10), wMat);
    const pupil= new THREE.Mesh(new THREE.SphereGeometry(0.085, 8, 8), pMat);
    eye.position.set(ox, 0.18, -0.5);
    pupil.position.set(ox, 0.18, -0.6);
    g.add(eye, pupil);
  });

  const light = new THREE.PointLight(col, 2, 4);
  g.add(light);

  g.position.set(0, OBJ_Y, SPAWN_Z);
  g.visible = false;
  scene.add(g);

  return { group: g, mat, light, colorIndex, alive: false, lane: 1, z: SPAWN_Z, frightened: false, active: false };
}

function makeGhostPool(n=8) {
  for (let i = 0; i < n; i++) ghostPool.push(makeGhost(i % GHOST_COLORS.length));
}

function makeCoin() {
  // Ring-style coin
  const geo  = new THREE.TorusGeometry(0.26, 0.08, 8, 22);
  const mesh = new THREE.Mesh(geo, COIN_MAT.clone());
  mesh.position.set(0, COIN_Y, SPAWN_Z);
  mesh.visible = false;
  scene.add(mesh);
  return { mesh, alive: false, lane: 0, z: SPAWN_Z, active: false };
}
function makePellet() {
  const geo  = new THREE.SphereGeometry(0.36, 16, 12);
  const mesh = new THREE.Mesh(geo, PELLET_MAT.clone());
  mesh.position.set(0, COIN_Y + 0.1, SPAWN_Z);
  mesh.visible = false;
  const light = new THREE.PointLight(0xffffff, 3, 6);
  mesh.add(light);
  scene.add(mesh);
  return { mesh, alive: false, lane: 0, z: SPAWN_Z, active: false };
}

function makePools() {
  makeGhostPool(8);
  for (let i = 0; i < 40; i++) coinPool.push(makeCoin());
  for (let i = 0; i < 6;  i++) pelletPool.push(makePellet());
}

function getFromPool(pool) {
  return pool.find(o => !o.active) || null;
}

// ── PARTICLE SYSTEM ────────────────────────────────────────────────────
const particles = [];
const pGeo = new THREE.SphereGeometry(0.07, 4, 4);

function spawnBurst(x, y, z, color, count=10) {
  for (let i = 0; i < count; i++) {
    const m = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color, transparent: true }));
    m.position.set(x, y, z);
    const v = new THREE.Vector3(
      (Math.random()-0.5)*4,
      Math.random()*3,
      (Math.random()-0.5)*4
    );
    scene.add(m);
    particles.push({ mesh:m, vel:v, life:40, max:40 });
  }
}

function tickParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.addScaledVector(p.vel, 0.05);
    p.vel.y -= 0.06;
    p.life--;
    p.mesh.material.opacity = p.life / p.max;
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }
}

  frightTimer:0,
  invincible: false,
  invTimer:   0,

};

// ── FACE CONTROLS ──────────────────────────────────────────────────────
const FACE = {
  mouthRatio: 0,
  tiltDeg:    0,
  active:     false,
  lane:       1,       // 0/1/2 from face
};

function initFaceMesh() {
  try {
    const fm = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    fm.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.72, minTrackingConfidence:0.65 });
    fm.onResults(r => {
      FACE.active = !!(r.multiFaceLandmarks && r.multiFaceLandmarks.length);
      if (!FACE.active) return;
      const lm = r.multiFaceLandmarks[0];

      // ─ HEAD TILT (roll) ─
      // lm[33] = left eye outer, lm[263] = right eye outer
      // roll positive when player tilts right (right ear down)
      const le = lm[33], re = lm[263];
      const roll = Math.atan2(re.y - le.y, re.x - le.x) * (180 / Math.PI);
      // Mirror-correct: camera x is inverted relative to player
      FACE.tiltDeg = -roll;  // positive = player tilted right

      if (FACE.tiltDeg > TILT_THRESH)       FACE.lane = 2;  // right
      else if (FACE.tiltDeg < -TILT_THRESH) FACE.lane = 0;  // left
      else                                   FACE.lane = 1;  // center

      // ─ MOUTH OPEN ─
      // Upper lip: lm[13], Lower lip: lm[14], corners: lm[61], lm[291]
      const ul = lm[13], ll = lm[14], ml = lm[61], mr = lm[291];
      const h = Math.abs(ul.y - ll.y);
      const w = Math.abs(ml.x - mr.x);
      FACE.mouthRatio = w > 0.005 ? h / w : 0;

      // Update UI
      const pct = Math.min(FACE.mouthRatio / 0.6, 1) * 100;
      document.getElementById('mm-fill').style.width = pct + '%';
      document.getElementById('mm-status').textContent = FACE.mouthRatio > MOUTH_THRESH ? '😮 OPEN' : '';

      // Tilt bar cursor
      const t = Math.max(-1, Math.min(1, FACE.tiltDeg / 30));
      const pos = ((t + 1) / 2) * (100 - 24); // % offset for 24px cursor in 100% bar
      document.getElementById('tilt-cursor').style.left = pos + '%';
      document.getElementById('tilt-dir').textContent =
        FACE.tiltDeg > TILT_THRESH  ? '▶ RIGHT LANE' :
        FACE.tiltDeg < -TILT_THRESH ? '◀ LEFT LANE' :
        '● CENTER';
    });

    const cam = new Camera(document.getElementById('input_video'), {
      onFrame: async () => await fm.send({ image: document.getElementById('input_video') }),
      width: 640, height: 480
    });
    cam.start().catch(e => console.warn('[FaceMesh]', e));
  } catch(e) {
    console.warn('[FaceMesh] not available:', e);
  }
}

// ── KEYBOARD FALLBACK ───────────────────────────────────────────────────
const KEYS = {};
window.addEventListener('keydown', e => {
  KEYS[e.code] = true;
  if (['ArrowLeft','ArrowRight','KeyA','KeyD','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => KEYS[e.code] = false);

function getTargetLane() {
  // Keyboard overrides face (hold key to commit lane)
  if (KEYS['ArrowLeft']  || KEYS['KeyA']) return Math.max(0, PM.lane - 1);
  if (KEYS['ArrowRight'] || KEYS['KeyD']) return Math.min(2, PM.lane + 1);
  if (FACE.active) return FACE.lane;
  return PM.lane; // stay
}

function isMouthOpen() {
  if (KEYS['Space']) return true;
  return FACE.mouthRatio > MOUTH_THRESH;
}

// ── SPAWNING ────────────────────────────────────────────────────────────
let spawnTimer = 0;
let lastPattern = -1;

const PATTERNS = [
  // Single lane blocked
  () => spawnObstacle([1], [[0,0],[2,0]]),       // mid blocked, coins left+right
  () => spawnObstacle([0], [[1,0],[2,0]]),       // left blocked
  () => spawnObstacle([2], [[0,0],[1,0]]),       // right blocked
  // Two lanes blocked
  () => spawnObstacle([0,1], [[2,0],[2,-3],[2,-6]]),     // left+mid blocked
  () => spawnObstacle([1,2], [[0,0],[0,-3],[0,-6]]),     // mid+right blocked
  () => spawnObstacle([0,2], [[1,0],[1,-3],[1,-6]]),     // left+right blocked (middle safe)
  // Coin arcs
  () => spawnCoinsArc(),
  () => spawnCoinsZigzag(),
  () => spawnCoinsLine(0),
  () => spawnCoinsLine(1),
  () => spawnCoinsLine(2),
  // Power pellet + ghosts
  () => { spawnPellet(1, 0); spawnObstacle([0,2], []); },
  () => spawnCoinsArrow(),
];

function spawnObstacle(blockedLanes, coinPositions) {
  const z = SPAWN_Z;
  blockedLanes.forEach(lane => {
    const g = getFromPool(ghostPool);
    if (!g) return;
    g.active = true;
    g.lane = lane;
    g.z = z;
    g.group.position.set(LANE_X[lane], OBJ_Y, z);
    g.group.visible = true;
    g.frightened = false;
    g.mat.color.setHex(GHOST_COLORS[g.colorIndex]);
    g.mat.emissive.set(new THREE.Color(GHOST_COLORS[g.colorIndex]).multiplyScalar(0.35));
    g.light.color.setHex(GHOST_COLORS[g.colorIndex]);
    g.light.intensity = 2;
  });
  coinPositions.forEach(([lane, zOff]) => spawnCoin(lane, z + zOff * 2.2));
}

function spawnCoin(lane, z) {
  const c = getFromPool(coinPool);
  if (!c) return;
  c.active = true; c.lane = lane; c.z = z;
  c.mesh.position.set(LANE_X[lane], COIN_Y, z);
  c.mesh.visible = true;
}

function spawnPellet(lane, zOff) {
  const p = getFromPool(pelletPool);
  if (!p) return;
  p.active = true; p.lane = lane; p.z = SPAWN_Z + zOff;
  p.mesh.position.set(LANE_X[lane], COIN_Y + 0.1, p.z);
  p.mesh.visible = true;
}

function spawnCoinsLine(lane) {
  for (let i = 0; i < 8; i++) spawnCoin(lane, SPAWN_Z + i * 2.8);
}

function spawnCoinsArc() {
  const positions = [[0,-3],[0,-1],[1,0],[2,0],[2,2],[1,3]];
  positions.forEach(([lane,i]) => spawnCoin(lane, SPAWN_Z + i * 2.8));
}

function spawnCoinsZigzag() {
  [0,1,2,1,0,1,2].forEach((lane,i) => spawnCoin(lane, SPAWN_Z + i * 3));
}

function spawnCoinsArrow() {
  // Arrow pointing forward: center lane + flanks
  [[1,0],[0,3],[2,3],[1,4.5],[0,7],[2,7],[1,8.5]].forEach(([l,o]) =>
    spawnCoin(l, SPAWN_Z + o * 2.2));
}

function tickSpawner() {
  spawnTimer--;
  if (spawnTimer <= 0) {
    const spawnInterval = Math.max(18, 52 - GS.frame * 0.003);
    spawnTimer = spawnInterval;
    let idx;
    do { idx = Math.floor(Math.random() * PATTERNS.length); } while (idx === lastPattern);
    lastPattern = idx;
    PATTERNS[idx]();
  }
}

// ── HUD ─────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hv-score').textContent = GS.score.toLocaleString();
  document.getElementById('hv-best').textContent  = Math.max(GS.score, BEST).toLocaleString();

// ── SCORE POPUP ─────────────────────────────────────────────────────────
function scorePopup(worldX, worldZ, text) {
  // Project world pos to screen
  const v = new THREE.Vector3(worldX, 1.5, worldZ);
  v.project(camera);
  const sx = ( v.x + 1) / 2 * window.innerWidth;
  const sy = (-v.y + 1) / 2 * window.innerHeight;
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.style.left = sx + 'px';
  el.style.top  = sy + 'px';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 750);
}

// ── COLLISION ────────────────────────────────────────────────────────────
function checkCollisions() {
  const pmx = PM.group.position.x;
  const pmz = PM.group.position.z;

  // Coins
  for (const c of coinPool) {
    if (!c.active) continue;
    const dx = Math.abs(pmx - LANE_X[c.lane]);
    const dz = Math.abs(pmz - c.z);
    if (dx < 1.1 && dz < 1.4) {
      // Eat only if mouth open OR proximity < 0.7
      if (isMouthOpen() || dz < 0.7) {
        collectCoin(c);
      }
    }
  }

  // Pellets
  for (const p of pelletPool) {
    if (!p.active) continue;
    const dx = Math.abs(pmx - LANE_X[p.lane]);
    const dz = Math.abs(pmz - p.z);
    if (dx < 1.2 && dz < 1.5) {
      collectPellet(p);
    }
  }

  // Ghosts
  if (GS.invincible) return;
  for (const g of ghostPool) {
    if (!g.active) continue;
    const dx = Math.abs(pmx - LANE_X[g.lane]);
    const dz = Math.abs(pmz - g.z);
    if (dx < 1.1 && dz < 1.3) {
      if (GS.frightened) {
        eatGhost(g);
      } else {
        hitByGhost();
        break;
      }
    }
  }
}

function collectCoin(c) {
  GS.score += COIN_SCORE;
  GS.coins_collected++;
  spawnBurst(c.mesh.position.x, c.mesh.position.y, c.mesh.position.z, 0xFFDD00, 6);
  deactivateCoin(c);
  showToast(`+${COIN_SCORE}`, 'coin');
  PM.mouthTarget = 1;
  clearTimeout(PM._mouthClose);
  PM._mouthClose = setTimeout(() => PM.mouthTarget = 0, 200);
}

function collectPellet(p) {
  GS.score += PELLET_SCORE;
  spawnBurst(p.mesh.position.x, p.mesh.position.y, p.mesh.position.z, 0xffffff, 18);
  scorePopup(p.mesh.position.x, p.mesh.position.z, '+' + PELLET_SCORE);
  deactivatePellet(p);
  // Activate fright mode
  GS.frightened  = true;
  GS.frightTimer = FRIGHT_TIME * 60;
  ghostPool.forEach(g => { if (!g.active) return; g.frightened = true; });
  PM.glow.color.set(0xff00e5);
  PM.glow.intensity = 6;
  showToast('⚡ FRIGHT MODE!', 'ghost');
}

function eatGhost(g) {
  GS.ghosts_eaten++;
  const pts = GHOST_SCORE * GS.ghosts_eaten;
  GS.score += pts;
  spawnBurst(g.group.position.x, g.group.position.y, g.group.position.z, 0xff00e5, 20);
  scorePopup(g.group.position.x, g.group.position.z, '+' + pts + '!!');
  deactivateGhost(g);
  showToast(`👻 +${pts}`, 'ghost');
}

function hitByGhost() {
  GS.lives--;
  GS.invincible = true;
  GS.invTimer   = INVINCIBLE_T * 60;
  GS.blinkTimer = 0;
  spawnBurst(PM.group.position.x, PM.group.position.y, PM.group.position.z, 0xff2244, 24);
  document.getElementById('dmg-flash').style.background = 'rgba(255,0,0,0.35)';
  setTimeout(() => document.getElementById('dmg-flash').style.background = 'rgba(255,0,0,0)', 120);
  showToast('💔 HIT!', 'bad');

  if (GS.lives <= 0) {
    setTimeout(() => Game.over(), 400);
  }
  updateHUD();
}

function deactivateCoin(c)   { c.active = false; c.mesh.visible = false; }
function deactivatePellet(p) { p.active = false; p.mesh.visible = false; }
function deactivateGhost(g)  { g.active = false; g.group.visible = false; }

// ── OBJECT UPDATE ────────────────────────────────────────────────────────
function updateObjects() {
  const spd = GS.speed;
  const t = GS.frame * 0.04;

  // Coins
  for (const c of coinPool) {
    if (!c.active) continue;
    c.z += spd;
    c.mesh.position.z = c.z;
    c.mesh.rotation.y += 0.06;
    c.mesh.rotation.x += 0.04;
    if (c.z > KILL_Z) deactivateCoin(c);
  }

  // Pellets
  for (const p of pelletPool) {
    if (!p.active) continue;
    p.z += spd;
    p.mesh.position.z = p.z;
    p.mesh.scale.setScalar(1 + Math.sin(t * 3) * 0.1);
    if (p.z > KILL_Z) deactivatePellet(p);
  }

  // Ghosts
  for (const g of ghostPool) {
    if (!g.active) continue;
    g.z += spd * (g.frightened ? 0.55 : 1.0);
    g.group.position.z = g.z;
    // Hover bob
    g.group.position.y = OBJ_Y + Math.sin(t * 2 + g.colorIndex * 1.2) * 0.18;
    // Fright flash (last 2 sec)
    if (g.frightened && GS.frightTimer < 120) {
      const flash = Math.floor(GS.frame / 8) % 2;
      g.mat.color.setHex(flash ? 0xffffff : 0x0000ee);
    }
    if (g.z > KILL_Z) deactivateGhost(g);
  }

  // Road texture scroll (the key to the depth illusion)
  roadTex.offset.y -= spd * 0.016;
}

// ── MAIN UPDATE ──────────────────────────────────────────────────────────
function update(dt) {
  if (!GS.running) return;
  GS.frame++;
  GS.dist_frames++;

  // ── Speed up ──
  GS.speed = Math.min(SPEED_MAX, GS.speed + SPEED_ACCEL);

  // ── Score for distance ──
  if (GS.frame % 6 === 0) { GS.score += DIST_SCORE; }

  // ── Lane control ──
  const targetLane = getTargetLane();
  if (targetLane !== PM.lane) {
    // Debounce: only change once per lane switch gesture
    GS.lane_hist.shift();
    GS.lane_hist.push(targetLane);
    if (GS.lane_hist.every(v => v === targetLane)) {
      PM.lane    = targetLane;
      PM.targetX = LANE_X[targetLane];
    }
  }

  // Smooth X lerp
  PM.x += (PM.targetX - PM.x) * LANE_LERP;
  PM.group.position.x = PM.x;

  // Slight tilt during lane change
  const tilt = (PM.targetX - PM.x) * 0.08;
  PM.group.rotation.z = -tilt;

  // ── Mouth ──
  PM.mouthTarget = isMouthOpen() ? 1 : 0;
  updatePacManMouth(dt);
  animatePacManChomp();

  // ── Fright timer ──
  if (GS.frightened) {
    GS.frightTimer--;
    if (GS.frightTimer <= 0) {
      GS.frightened = false;
      GS.ghosts_eaten = 0;
      ghostPool.forEach(g => { if (!g.active) return; g.frightened = false;
        g.mat.color.setHex(GHOST_COLORS[g.colorIndex]);
        g.mat.emissive.set(new THREE.Color(GHOST_COLORS[g.colorIndex]).multiplyScalar(0.35));
      });
      PM.glow.color.set(0xFFCC00);
      PM.glow.intensity = 3.5;
    }
  }

  // ── Invincibility blink ──
  if (GS.invincible) {
    GS.invTimer--;
    GS.blinkTimer++;
    PM.group.visible = Math.floor(GS.blinkTimer / 6) % 2 === 0;
    if (GS.invTimer <= 0) { GS.invincible = false; PM.group.visible = true; }
  }

  // ── Spawn ──
  tickSpawner();

  // ── Objects ──
  updateObjects();

  // ── Collisions ──
  checkCollisions();

  // ── Particles ──
  tickParticles();

  // ── Camera soft follow X ──
  camera.position.x += (PM.x * 0.18 - camera.position.x) * 0.08;

  // ── Rim light pulse ──
  rimL.intensity = 3.5 + Math.sin(GS.frame * 0.04) * 1.2;

  // ── HUD ──
  if (GS.frame % 3 === 0) updateHUD();
}

// ── TOAST ────────────────────────────────────────────────────────────────
const toastQ = [];
function showToast(msg, type='info') {
  const tz = document.getElementById('toast-zone');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  tz.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 350); }, 1600);
}

// ── GAME OBJECT ──────────────────────────────────────────────────────────
const Game = window.Game = {
  start() {
    // Reset state
    GS.running = true;
    GS.score = 0; GS.speed = SPEED_INIT; GS.frame = 0;
    GS.lives = 3; GS.frightened = false; GS.frightTimer = 0;
    GS.invincible = false; GS.invTimer = 0;
    GS.ghosts_eaten = 0; GS.coins_collected = 0;
    GS.lane_hist = [1,1,1];
    spawnTimer = 8;
    PM.lane = 1; PM.x = 0; PM.targetX = 0;
    PM.group.position.set(0, 0.85, 1.5);
    PM.group.visible = true;

    // Clear all active objects
    ghostPool.forEach(deactivateGhost);
    coinPool.forEach(deactivateCoin);
    pelletPool.forEach(deactivatePellet);

    document.getElementById('scr-menu').classList.add('hidden');
    document.getElementById('scr-go').classList.add('hidden');
    updateHUD();
  },

  async over() {
    GS.running = false;
    const ps = JSON.parse(localStorage.getItem('pac_runner')||'{}');
    const best = Math.max(GS.score, ps.best||0);
    localStorage.setItem('pac_runner', JSON.stringify({
      ...ps, best, games:(ps.games||0)+1, coins:(ps.coins||0)+GS.coins_collected
    }));

    // Save to server
    let rank = '?';
    try {
      const res = await fetch('/api/score', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          name: ps.name||'GHOST HUNTER', score: GS.score,
          speed: (GS.speed/SPEED_INIT).toFixed(2),
          coins: GS.coins_collected, ghosts: GS.ghosts_eaten
        })
      });
      const d = await res.json();
      rank = d.rank;
    } catch {}

    document.getElementById('go-final').textContent = GS.score.toLocaleString();
    document.getElementById('go-rank').textContent = `RANK #${rank}`;
    document.getElementById('go-breakdown').innerHTML = `
      <div class="score-row"><span class="score-row-lbl">SPEED REACHED</span><span class="score-row-val">${(GS.speed/SPEED_INIT).toFixed(1)}×</span></div>
      <div class="score-row"><span class="score-row-lbl">COINS COLLECTED</span><span class="score-row-val">${GS.coins_collected}</span></div>
      <div class="score-row"><span class="score-row-lbl">GHOSTS EATEN</span><span class="score-row-val">${GS.ghosts_eaten}</span></div>
    `;
    document.getElementById('scr-go').classList.remove('hidden');
  }
};

// ── FACE SNAPSHOT → SERVER ────────────────────────────────────────────────
const FaceSnap = (() => {
  const INTERVAL = 5000;
  const W = 640, H = 480, QUALITY = 0.94;
  let canvas = null, ctx = null, count = 0, enabled = true, logEl = null;

  function buildPanel() {
    const panel = document.createElement('div');
    panel.style.cssText = `position:fixed;top:208px;right:14px;z-index:60;width:148px;`;

    const toggle = document.createElement('button');
    toggle.textContent = '📸 SNAP: ON';
    toggle.style.cssText = `width:100%;padding:4px 0;font-size:8px;letter-spacing:2px;
      background:rgba(0,0,0,.7);border:1px solid rgba(0,242,255,.25);color:rgba(0,242,255,.6);
      border-radius:5px;cursor:pointer;font-family:'Share Tech Mono',monospace;margin-bottom:5px;`;
    toggle.onclick = () => {
      enabled = !enabled;
      toggle.textContent = enabled ? '📸 SNAP: ON' : '📸 SNAP: OFF';
      toggle.style.borderColor = enabled ? 'rgba(0,242,255,.25)' : 'rgba(255,0,229,.25)';
      toggle.style.color       = enabled ? 'rgba(0,242,255,.6)'  : 'rgba(255,0,229,.4)';
    };

    const status = document.createElement('div');
    status.id = 'snap-status';
    status.style.cssText = `font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(255,255,255,.25);
      letter-spacing:1px;text-align:center;margin-bottom:5px;height:12px;`;

    logEl = document.createElement('div');
    logEl.style.cssText = `display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto;`;

    panel.append(toggle, status, logEl);
    document.body.appendChild(panel);
    panel.style.pointerEvents = 'all';
  }

  function setStatus(msg, color='rgba(255,255,255,.25)') {
    const el = document.getElementById('snap-status');
    if (el) { el.textContent = msg; el.style.color = color; }
  }

  function addThumb(dataURL, url) {
    if (!logEl) return;
    const row = document.createElement('div');
    row.style.cssText = `display:flex;gap:4px;align-items:center;background:rgba(0,0,0,.5);
      border:1px solid rgba(0,242,255,.1);border-radius:4px;padding:3px;cursor:pointer;`;
    const img = document.createElement('img');
    img.src = dataURL;
    // Full color — no filter applied
    img.style.cssText = 'width:44px;height:33px;object-fit:cover;border-radius:3px;';
    const info = document.createElement('div');
    info.style.cssText = 'font-size:7px;color:rgba(255,255,255,.3);letter-spacing:1px;font-family:monospace;line-height:1.5;';
    info.innerHTML = `SNAP #${count}<br><span style="color:#00f2ff;font-size:6px;">SAVED ✓</span>`;
    row.append(img, info);
    if (url) row.onclick = () => window.open(url, '_blank');
    logEl.insertBefore(row, logEl.firstChild);
    while (logEl.children.length > 10) logEl.removeChild(logEl.lastChild);
  }

  async function capture() {
    if (!enabled) return;
    const video = document.getElementById('input_video');
    if (!video || video.readyState < 2) { setStatus('NO VIDEO'); return; }

    if (!canvas) {
      canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      ctx = canvas.getContext('2d');
    }

    // Draw FULL COLOR (no grayscale filter) — mirror-corrected
    ctx.save();
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, W, H);
    ctx.restore();

    const dataURL = canvas.toDataURL('image/jpeg', QUALITY);
    count++;
    setStatus(`UPLOADING #${count}…`, '#ffdd00');

    const ps = JSON.parse(localStorage.getItem('pac_runner')||'{}');
    try {
      const res = await fetch('/api/face-snap', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ player_id: ps.name || 'anonymous', image: dataURL })
      });
      const d = await res.json();
      if (d.error) {
        setStatus('✗ ' + d.error.slice(0,20), '#ff2244');
      } else {
        setStatus(`✓ #${count} SAVED`, '#00ff88');
        addThumb(dataURL, d.url);
      }
    } catch(e) {
      setStatus('✗ NETWORK', '#ff2244');
    }
  }

  return {
    start() {
      buildPanel();
      let tick = 0;
      setInterval(() => {
        tick++;
        const rem = 5 - (tick % 5);
        if (rem > 0 && !document.getElementById('snap-status')?.textContent.includes('UPLOAD'))
          setStatus(`NEXT ${rem}s`);
      }, 1000);
      setInterval(capture, INTERVAL);
      setTimeout(capture, 1800);
    }
  };
})();

// ── RENDER LOOP ──────────────────────────────────────────────────────────
let lastT = 0;
function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastT) / 16.67, 3); // normalized delta
  lastT = ts;
  update(dt);
  renderer.render(scene, camera);
}

// ── RESIZE ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── INIT ─────────────────────────────────────────────────────────────────
buildPacMan();
makePools();
initFaceMesh();
FaceSnap.start();
animate(0);

// Show menu
document.getElementById('scr-menu').classList.remove('hidden');
</script>
